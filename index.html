<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra - Product List</title>
    <style>
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: left; }
        th { background-color: #f4f4f4; }
    </style>
</head>
<body>

    <h1>Product Inventory</h1>

    <h3>Add New Product</h3>
    <form id="addProductForm">
        <input type="text" id="name" placeholder="Product Name" required>
        <input type="number" id="price" step="0.01" placeholder="Price" required>
        <input type="number" id="quantity" placeholder="Quantity" required>
        <button type="submit">Add Product</button>
    </form>

    <table id="productTable">
        <thead>
            <tr>
                <th>Name</th>
                <th>Price</th>
                <th>Quantity</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <!-- Data will be inserted here -->
        </tbody>
    </table>

    <script>
        // Function to fetch and display products
        async function loadProducts() {
            try {
                const response = await fetch('get_products.php');
                const products = await response.json();

                const tableBody = document.querySelector('#productTable tbody');
                tableBody.innerHTML = ''; // Clear existing content

                products.forEach(product => {
                    const lowStockLabel = product.quantity < 5 ? ' <span style="color: red; font-weight: bold;">(Low Stock)</span>' : '';
                    const row = `<tr>
                        <td>${product.name}${lowStockLabel}</td>
                        <td>$${product.price}</td>
                        <td>${product.quantity}</td>
                        <td>
                            <button onclick="deleteProduct(${product.id})">Delete</button>
                        </td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } catch (error) {
                console.error('Error fetching products:', error);
            }
        }

        // Function to delete a product
        async function deleteProduct(id) {
            if (!confirm('Are you sure you want to delete this product?')) return;

            const formData = new FormData();
            formData.append('id', id);

            try {
                const response = await fetch('delete_product.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success') {
                    alert(result.message);
                    loadProducts(); // Refresh the list
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error deleting product:', error);
            }
        }

        // Handle form submission
        document.getElementById('addProductForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const formData = new FormData();
            formData.append('name', document.getElementById('name').value);
            formData.append('price', document.getElementById('price').value);
            formData.append('quantity', document.getElementById('quantity').value);

            try {
                const response = await fetch('add_product.php', {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();

                if (result.status === 'success') {
                    alert(result.message);
                    document.getElementById('addProductForm').reset();
                    loadProducts(); // Refresh the list
                } else {
                    alert('Error: ' + result.message);
                }
            } catch (error) {
                console.error('Error adding product:', error);
            }
        });

        // Load products on page load
        loadProducts();
    </script>
</body>
</html>
