<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra | Profile</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard_frontend.html">
                <i class="bi bi-box-seam-fill me-2 fs-3"></i> Inventra
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard_frontend.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="products_frontend.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="add_product_frontend.html">Add Product</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Profile</a></li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-outline-danger btn-sm px-4">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5 animate-fade">
        <div class="row g-4">
            <!-- Profile Info -->
            <div class="col-lg-6">
                <div class="card p-4 p-lg-5 h-100">
                    <div class="d-flex align-items-center mb-5">
                        <div class="bg-primary text-white d-flex align-items-center justify-content-center rounded-4 shadow-sm fw-bold fs-2 me-4" style="width: 80px; height: 80px;" id="avatarCircle">U</div>
                        <div>
                            <h2 class="fw-bold m-0" id="displayUserName">User Name</h2>
                            <p class="text-muted m-0" id="displayUserEmail">user@company.com</p>
                        </div>
                    </div>
                    
                    <h5 class="fw-bold mb-4">Personal Details</h5>
                    <form id="profileForm">
                        <div class="mb-3">
                            <label class="form-label">Full Name</label>
                            <input type="text" id="name" class="form-control shadow-none" required>
                        </div>
                        <div class="mb-4">
                            <label class="form-label">Email Address</label>
                            <input type="email" id="email" class="form-control shadow-none" required>
                        </div>
                        <button type="submit" id="saveProfileBtn" class="btn btn-primary w-100">Save Changes</button>
                    </form>
                </div>
            </div>

            <!-- Security Settings -->
            <div class="col-lg-6">
                <div class="card p-4 p-lg-5 h-100">
                    <div class="bg-soft-warning p-3 rounded-4 d-inline-flex mb-4" style="width: fit-content;">
                        <i class="bi bi-shield-lock fs-3 text-warning"></i>
                    </div>
                    <h3 class="fw-bold mb-1">Security</h3>
                    <p class="text-muted mb-5">Ensure your account is using a strong password.</p>

                    <form id="passwordForm">
                        <div class="mb-3">
                            <label class="form-label">Current Password</label>
                            <input type="password" id="currentPassword" class="form-control shadow-none" required>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">New Password</label>
                            <input type="password" id="newPassword" class="form-control shadow-none" required>
                        </div>
                        <div class="mb-5">
                            <label class="form-label">Confirm Password</label>
                            <input type="password" id="confirmPassword" class="form-control shadow-none" required>
                        </div>
                        <button type="submit" id="changePassBtn" class="btn btn-outline-primary w-100">Update Password</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="logout.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const profileForm = document.getElementById('profileForm');
            const passwordForm = document.getElementById('passwordForm');

            async function loadProfile() {
                try {
                    const response = await fetch('/api/get_profile.php');
                    const data = await response.json();
                    if (data.success) {
                        document.getElementById('name').value = data.user.name;
                        document.getElementById('email').value = data.user.email;
                        document.getElementById('displayUserName').textContent = data.user.name;
                        document.getElementById('displayUserEmail').textContent = data.user.email;
                        document.getElementById('avatarCircle').textContent = data.user.name.charAt(0).toUpperCase();
                    }
                } catch (e) { console.error(e); }
            }

            profileForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const saveBtn = document.getElementById('saveProfileBtn');
                saveBtn.disabled = true;
                saveBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Saving...`;
                try {
                    const payload = { name: document.getElementById('name').value, email: document.getElementById('email').value };
                    await fetch('/api/update_profile.php', { method: 'POST', body: JSON.stringify(payload) });
                    alert('Profile updated!');
                    loadProfile();
                } catch (e) { alert('Update failed'); }
                finally { saveBtn.disabled = false; saveBtn.innerHTML = 'Save Changes'; }
            });

            passwordForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                if (document.getElementById('newPassword').value !== document.getElementById('confirmPassword').value) {
                    alert('Passwords match fail.'); return;
                }
                const changeBtn = document.getElementById('changePassBtn');
                changeBtn.disabled = true;
                try {
                    const payload = { 
                        currentPassword: document.getElementById('currentPassword').value, 
                        newPassword: document.getElementById('newPassword').value 
                    };
                    await fetch('/api/change_password.php', { method: 'POST', body: JSON.stringify(payload) });
                    alert('Password updated!');
                    passwordForm.reset();
                } catch (e) { alert('Failed to update.'); }
                finally { changeBtn.disabled = false; }
            });

            loadProfile();
        });
    </script>
</body>
</html>
