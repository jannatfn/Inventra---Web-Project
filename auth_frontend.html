<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra | Access Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --iv-bg: #f8fafc;
            --iv-primary: #4f46e5;
            --iv-text: #1e293b;
            --iv-secondary: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--iv-bg);
            color: var(--iv-text);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            border-radius: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.05), 0 10px 10px -5px rgba(0, 0, 0, 0.02);
            width: 100%;
            max-width: 450px;
            overflow: hidden;
            border: 1px solid #e2e8f0;
        }

        .auth-header {
            padding: 40px 40px 20px 40px;
            text-align: center;
        }

        .auth-logo {
            font-size: 2rem;
            font-weight: 800;
            color: var(--iv-primary);
            letter-spacing: -1px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .auth-body {
            padding: 20px 40px 40px 40px;
        }

        .form-label {
            font-weight: 600;
            font-size: 0.875rem;
            color: var(--iv-secondary);
            margin-bottom: 8px;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            background-color: #f1f5f9;
            transition: all 0.2s;
        }

        .form-control:focus {
            background-color: white;
            border-color: var(--iv-primary);
            box-shadow: 0 0 0 4px rgba(79, 70, 229, 0.1);
        }

        .btn-auth {
            background-color: var(--iv-primary);
            color: white;
            border-radius: 12px;
            padding: 12px;
            font-weight: 700;
            width: 100%;
            border: none;
            margin-top: 10px;
            transition: transform 0.2s;
        }

        .btn-auth:hover {
            background-color: #4338ca;
            color: white;
            transform: translateY(-1px);
        }

        .btn-auth:active {
            transform: translateY(0);
        }

        .auth-footer {
            text-align: center;
            margin-top: 24px;
            font-size: 0.9rem;
            color: var(--iv-secondary);
        }

        .auth-footer a {
            color: var(--iv-primary);
            text-decoration: none;
            font-weight: 700;
        }

        .error-area {
            display: none;
            background-color: #fef2f2;
            color: #b91c1c;
            padding: 12px;
            border-radius: 12px;
            font-size: 0.85rem;
            margin-bottom: 20px;
            border: 1px solid #fee2e2;
            align-items: center;
        }

        .hidden {
            display: none;
        }

        /* Animation for switching forms */
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="auth-card fade-in">
        <div class="auth-header">
            <div class="auth-logo">
                <i class="bi bi-box-seam-fill me-2"></i> Inventra
            </div>
            <h4 id="formTitle" class="fw-bold mb-1">Welcome back</h4>
            <p id="formSubtitle" class="text-secondary">Please enter your details to sign in.</p>
        </div>

        <div class="auth-body">
            <!-- Error Alert Container -->
            <div id="errorArea" class="error-area">
                <i class="bi bi-exclamation-circle me-2"></i>
                <span id="errorMessage">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form id="loginForm">
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control shadow-none" placeholder="name@company.com" required>
                </div>
                <div class="mb-4">
                    <div class="d-flex justify-content-between">
                        <label class="form-label">Password</label>
                        <a href="#" class="text-primary text-decoration-none fw-semibold small">Forgot?</a>
                    </div>
                    <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth shadow-sm">Sign in</button>
            </form>

            <!-- Register Form (Hidden by default) -->
            <form id="registerForm" class="hidden">
                <div class="mb-3">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control shadow-none" placeholder="John Doe" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control shadow-none" placeholder="name@company.com" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
                </div>
                <div class="mb-4">
                    <label class="form-label">Confirm Password</label>
                    <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn-auth shadow-sm">Create account</button>
            </form>

            <div class="auth-footer">
                <span id="footerText">Don't have an account?</span>
                <a href="javascript:void(0)" id="toggleLink">Sign up</a>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleLink = document.getElementById('toggleLink');
        const formTitle = document.getElementById('formTitle');
        const formSubtitle = document.getElementById('formSubtitle');
        const footerText = document.getElementById('footerText');
        const errorArea = document.getElementById('errorArea');

        let isLogin = true;

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            
            // Toggle forms
            loginForm.classList.toggle('hidden');
            registerForm.classList.toggle('hidden');
            
            // Reset error area
            errorArea.style.display = 'none';

            // Update text
            if (isLogin) {
                formTitle.textContent = 'Welcome back';
                formSubtitle.textContent = 'Please enter your details to sign in.';
                footerText.textContent = "Don't have an account?";
                toggleLink.textContent = 'Sign up';
            } else {
                formTitle.textContent = 'Create account';
                formSubtitle.textContent = 'Join Inventra and start managing today.';
                footerText.textContent = 'Already have an account?';
                toggleLink.textContent = 'Sign in';
            }
        });

        // Demo error display function
        function showError(msg) {
            document.getElementById('errorMessage').textContent = msg;
            errorArea.style.display = 'flex';
        }

        // Handle form submissions
        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            
            // Reset state
            errorArea.style.display = 'none';
            const submitBtn = loginForm.querySelector('button[type="submit"]');
            const originalBtnText = submitBtn.innerHTML;
            
            // Get form data
            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;

            // Show loading state
            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Signing in...`;

            try {
                const response = await fetch('/api/login.php', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email, password })
                });

                const result = await response.json();

                if (response.ok && result.success) {
                    // Redirect on success
                    window.location.href = 'dashboard_frontend.html';
                } else {
                    // Show error from server
                    showError(result.message || 'Invalid email or password.');
                }
            } catch (error) {
                console.error('Fetch error:', error);
                showError('Unable to connect to the server. Please try again later.');
            } finally {
                // Restore button state
                submitBtn.disabled = false;
                submitBtn.innerHTML = originalBtnText;
            }
        });

        registerForm.addEventListener('submit', (e) => {
            e.preventDefault();
            console.log('Registration attempt');
        });
    </script>
</body>
</html>
