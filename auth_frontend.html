<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra | Access Portal</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body class="d-flex align-items-center justify-content-center p-3" style="min-height: 100vh;">

    <div class="card p-4 p-lg-5 animate-fade" style="width: 100%; max-width: 480px;">
        <div class="text-center mb-5">
            <div class="auth-logo mb-3 d-flex align-items-center justify-content-center text-primary fs-1 fw-bold">
                <i class="bi bi-box-seam-fill me-3"></i> Inventra
            </div>
            <h2 id="formTitle" class="fw-bold m-0">Welcome Back</h2>
            <p id="formSubtitle" class="text-muted">Enter your credentials to manage inventory.</p>
        </div>

        <!-- Notification -->
        <div id="errorArea" class="alert alert-danger d-none rounded-4 mb-4 fw-bold">
            <i class="bi bi-exclamation-circle me-2"></i> <span id="errorMessage">Invalid email or password.</span>
        </div>

        <!-- Login Form -->
        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control shadow-none" placeholder="name@company.com" required>
            </div>
            <div class="mb-5">
                <div class="d-flex justify-content-between">
                    <label class="form-label">Password</label>
                    <a href="#" class="text-primary text-decoration-none small fw-bold">Forgot?</a>
                </div>
                <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fs-5">Sign in</button>
        </form>

        <!-- Register Form (Hidden) -->
        <form id="registerForm" class="d-none">
            <div class="mb-3">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-control shadow-none" placeholder="John Doe" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Email Address</label>
                <input type="email" class="form-control shadow-none" placeholder="name@company.com" required>
            </div>
            <div class="mb-3">
                <label class="form-label">Password</label>
                <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
            </div>
            <div class="mb-5">
                <label class="form-label">Confirm Password</label>
                <input type="password" class="form-control shadow-none" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn btn-primary w-100 py-3 fs-5">Create Account</button>
        </form>

        <div class="text-center mt-5">
            <span id="footerText" class="text-muted fw-medium">Don't have an account?</span>
            <a href="javascript:void(0)" id="toggleLink" class="text-primary text-decoration-none fw-bold ms-1">Sign up</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        const loginForm = document.getElementById('loginForm');
        const registerForm = document.getElementById('registerForm');
        const toggleLink = document.getElementById('toggleLink');
        const errorArea = document.getElementById('errorArea');

        let isLogin = true;

        toggleLink.addEventListener('click', () => {
            isLogin = !isLogin;
            loginForm.classList.toggle('d-none');
            registerForm.classList.toggle('d-none');
            errorArea.classList.add('d-none');
            
            document.getElementById('formTitle').textContent = isLogin ? 'Welcome Back' : 'Create Account';
            document.getElementById('formSubtitle').textContent = isLogin ? 'Enter your credentials to manage inventory.' : 'Join us and start tracking your stock today.';
            document.getElementById('footerText').textContent = isLogin ? "Don't have an account?" : "Already have an account?";
            toggleLink.textContent = isLogin ? 'Sign up' : 'Sign in';
        });

        loginForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = loginForm.querySelector('input[type="email"]').value;
            const password = loginForm.querySelector('input[type="password"]').value;
            const btn = loginForm.querySelector('button');
            
            btn.disabled = true;
            btn.innerHTML = `<span class="spinner-border spinner-border-sm"></span>`;
            
            try {
                const res = await fetch('/api/login.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ email, password })
                });
                const data = await res.json();
                if (data.success) window.location.href = 'dashboard_frontend.html';
                else {
                    document.getElementById('errorMessage').textContent = data.message || 'Login failed.';
                    errorArea.classList.remove('d-none');
                }
            } catch (e) {
                document.getElementById('errorMessage').textContent = 'Server error.';
                errorArea.classList.remove('d-none');
            } finally {
                btn.disabled = false;
                btn.innerHTML = 'Sign in';
            }
        });
    </script>
</body>
</html>
