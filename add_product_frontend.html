<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra | Add Product</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="public/css/style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard_frontend.html">
                <i class="bi bi-box-seam-fill me-2 fs-3"></i> Inventra
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard_frontend.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="products_frontend.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link active" href="#">Add Product</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile_frontend.html">Profile</a></li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-outline-danger btn-sm px-4">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5 mt-5 animate-fade">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card p-4 p-lg-5">
                    <div class="text-center mb-4">
                        <div class="bg-primary bg-opacity-10 text-primary d-inline-flex p-3 rounded-circle mb-3">
                            <i class="bi bi-plus-circle fs-2"></i>
                        </div>
                        <h2 class="fw-bold m-0">New Product</h2>
                        <p class="text-muted">Register a new item in your inventory.</p>
                    </div>

                    <!-- Notification Area -->
                    <div id="statusAlert" class="alert d-none rounded-4 mb-4 fw-bold"></div>

                    <form id="addProductForm">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" id="name" class="form-control shadow-none" placeholder="e.g. Dell Latitude 5420" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label">Price ($)</label>
                                <input type="number" id="price" class="form-control shadow-none" step="0.01" placeholder="0.00" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Quantity</label>
                                <input type="number" id="quantity" class="form-control shadow-none" placeholder="0" required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" id="submitBtn" class="btn btn-primary">
                                <i class="bi bi-check-lg me-2"></i>Save Product
                            </button>
                        </div>
                    </form>
                    <div class="text-center mt-4">
                        <a href="products_frontend.html" class="text-muted text-decoration-none small fw-bold hover-primary">
                            <i class="bi bi-arrow-left me-1"></i> Back to Products
                        </a>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="public/js/logout.js"></script>

    <script>
        const form = document.getElementById('addProductForm');
        const alertBox = document.getElementById('statusAlert');
        const submitBtn = document.getElementById('submitBtn');

        function showAlert(msg, type) {
            alertBox.textContent = msg;
            alertBox.className = `alert alert-${type} d-block rounded-4 mb-4 fw-bold`;
            if (type === 'success') setTimeout(() => { alertBox.classList.add('d-none'); }, 5000);
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const productData = {
                name: document.getElementById('name').value,
                price: parseFloat(document.getElementById('price').value),
                quantity: parseInt(document.getElementById('quantity').value)
            };

            submitBtn.disabled = true;
            submitBtn.innerHTML = `<span class="spinner-border spinner-border-sm me-2"></span>Saving...`;

            try {
                const response = await fetch('/api/add_product.php', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(productData)
                });
                const result = await response.json();
                if (result.success) {
                    showAlert('Product added successfully!', 'success');
                    form.reset();
                } else {
                    showAlert(result.message || 'Error adding product.', 'danger');
                }
            } catch (error) {
                showAlert('Connection failed.', 'danger');
            } finally {
                submitBtn.disabled = false;
                submitBtn.innerHTML = `<i class="bi bi-check-lg me-2"></i>Save Product`;
            }
        });
    </script>
</body>
</html>
