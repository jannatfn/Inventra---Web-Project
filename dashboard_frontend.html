<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra | Dashboard</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="#">
                <i class="bi bi-box-seam-fill me-2 fs-3"></i>
                Inventra
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link active" href="dashboard_frontend.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link" href="products_frontend.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="add_product_frontend.html">Add Product</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile_frontend.html">Profile</a></li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-outline-danger btn-sm px-4">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5 mt-5 animate-fade">
        <div class="row align-items-center mb-5">
            <div class="col-md-6">
                <h1 class="fw-bold m-0">Overview</h1>
                <p class="text-muted fs-5">Control and monitor your inventory in real-time.</p>
            </div>
            <div class="col-md-6 text-md-end">
                <a href="add_product_frontend.html" class="btn btn-primary">
                    <i class="bi bi-plus-circle me-2"></i>New Product
                </a>
            </div>
        </div>

        <div class="row g-4 mb-5">
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card card-hover p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-soft-success p-3 rounded-4"><i class="bi bi-box fs-4"></i></div>
                        <span class="badge bg-success bg-opacity-10 text-success rounded-pill">+5%</span>
                    </div>
                    <h6 class="text-muted fw-semibold">Total Items</h6>
                    <h2 class="fw-bold m-0">2,482</h2>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card card-hover p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-soft-danger p-3 rounded-4"><i class="bi bi-exclamation-triangle fs-4"></i></div>
                    </div>
                    <h6 class="text-muted fw-semibold">Low Stock</h6>
                    <h2 class="fw-bold m-0">12</h2>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card card-hover p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-soft-warning p-3 rounded-4"><i class="bi bi-currency-dollar fs-4"></i></div>
                    </div>
                    <h6 class="text-muted fw-semibold">Total Value</h6>
                    <h2 class="fw-bold m-0">$42,500</h2>
                </div>
            </div>
            <div class="col-12 col-md-6 col-lg-3">
                <div class="card card-hover p-4">
                    <div class="d-flex justify-content-between align-items-start mb-3">
                        <div class="bg-soft-success p-3 rounded-4"><i class="bi bi-people fs-4"></i></div>
                    </div>
                    <h6 class="text-muted fw-semibold">Active Users</h6>
                    <h2 class="fw-bold m-0">8</h2>
                </div>
            </div>
        </div>

        <div class="card p-4">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <h5 class="fw-bold m-0">Recent Activity</h5>
                <a href="#" class="btn btn-link text-decoration-none fw-bold text-primary">View Full Report</a>
            </div>
            <p class="text-muted text-center py-5">Your recent system activities will appear here.</p>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="logout.js"></script>
</body>
</html>
