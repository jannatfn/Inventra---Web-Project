<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventra | Inventory</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- Custom Style -->
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg fixed-top py-3">
        <div class="container">
            <a class="navbar-brand d-flex align-items-center" href="dashboard_frontend.html">
                <i class="bi bi-box-seam-fill me-2 fs-3"></i>
                Inventra
            </a>
            <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <i class="bi bi-list fs-2"></i>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav mx-auto">
                    <li class="nav-item"><a class="nav-link" href="dashboard_frontend.html">Dashboard</a></li>
                    <li class="nav-item"><a class="nav-link active" href="products_frontend.html">Products</a></li>
                    <li class="nav-item"><a class="nav-link" href="add_product_frontend.html">Add Product</a></li>
                    <li class="nav-item"><a class="nav-link" href="profile_frontend.html">Profile</a></li>
                </ul>
                <div class="d-flex">
                    <button class="btn btn-outline-danger btn-sm px-4">Logout</button>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container py-5 mt-5 animate-fade">
        <div class="row align-items-center mb-4 g-3">
            <div class="col-md-4">
                <h2 class="fw-bold m-0">Inventory</h2>
                <p class="text-muted m-0">Tracking <span id="productCount" class="fw-bold text-primary">0</span> active products.</p>
            </div>
            <div class="col-md-5">
                <div class="position-relative">
                    <i class="bi bi-search position-absolute top-50 start-0 translate-middle-y ms-3 text-muted"></i>
                    <input type="text" class="form-control ps-5 shadow-none" placeholder="Search product name or SKU...">
                </div>
            </div>
            <div class="col-md-3 text-md-end">
                <a href="add_product_frontend.html" class="btn btn-primary w-100 w-md-auto">
                    <i class="bi bi-plus-lg me-2"></i>New Product
                </a>
            </div>
        </div>

        <div class="table-container shadow-sm">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead>
                        <tr>
                            <th class="ps-4">Product Name</th>
                            <th>Category</th>
                            <th>Price</th>
                            <th>Stock Status</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- Data loaded via JS -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <!-- Edit Modal -->
    <div class="modal fade" id="editProductModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content animate-fade border-0" style="border-radius: 20px;">
                <div class="modal-header border-0 p-4 pb-0">
                    <h4 class="fw-bold m-0">Edit Product</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body p-4">
                    <form id="editProductForm">
                        <input type="hidden" id="editId">
                        <div class="mb-3">
                            <label class="form-label">Product Name</label>
                            <input type="text" id="editName" class="form-control shadow-none" required>
                        </div>
                        <div class="row g-3 mb-4">
                            <div class="col-6">
                                <label class="form-label">Price ($)</label>
                                <input type="number" id="editPrice" class="form-control shadow-none" step="0.01" required>
                            </div>
                            <div class="col-6">
                                <label class="form-label">Quantity</label>
                                <input type="number" id="editQuantity" class="form-control shadow-none" required>
                            </div>
                        </div>
                        <div class="d-grid">
                            <button type="submit" id="updateBtn" class="btn btn-primary">Update Product</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <!-- Bootstrap 5 JS Bundle -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="logout.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const tableBody = document.querySelector('tbody');
            const editModal = new bootstrap.Modal(document.getElementById('editProductModal'));
            const editForm = document.getElementById('editProductForm');

            async function loadProducts() {
                tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-5">
                    <div class="spinner-border text-primary" role="status"></div>
                </td></tr>`;

                try {
                    const response = await fetch('/api/get_products.php');
                    const products = await response.json();

                    if (products.length === 0) {
                        tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-muted">No products found.</td></tr>`;
                        return;
                    }

                    tableBody.innerHTML = '';
                    products.forEach(product => {
                        const isLow = product.quantity <= 5;
                        const sClass = isLow ? 'soft-danger' : (product.quantity <= 15 ? 'soft-warning' : 'soft-success');
                        const sText = isLow ? 'Low Stock' : `${product.quantity} units`;

                        const row = `
                            <tr data-id="${product.id}" class="animate-fade">
                                <td class="ps-4">
                                    <div class="fw-bold text-dark product-name">${product.name}</div>
                                    <small class="text-muted">SKU: ${product.sku || 'N/A'}</small>
                                </td>
                                <td><span class="text-muted">${product.category || 'General'}</span></td>
                                <td class="fw-bold product-price">$${parseFloat(product.price).toFixed(2)}</td>
                                <td><span class="badge-stock bg-${sClass} product-stock-badge">${sText}</span></td>
                                <td class="text-end pe-4">
                                    <button class="action-btn me-2" onclick="editProduct(${product.id})"><i class="bi bi-pencil-square"></i></button>
                                    <button class="action-btn action-btn-delete text-danger" onclick="deleteProduct(${product.id})"><i class="bi bi-trash3"></i></button>
                                </td>
                            </tr>
                        `;
                        tableBody.insertAdjacentHTML('beforeend', row);
                    });
                    document.getElementById('productCount').textContent = products.length;
                } catch (e) {
                    tableBody.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-danger">Error loading data.</td></tr>`;
                }
            }

            // Edit Product Functionality
            window.editProduct = (id) => {
                const row = document.querySelector(`tr[data-id="${id}"]`);
                document.getElementById('editId').value = id;
                document.getElementById('editName').value = row.querySelector('.product-name').textContent;
                document.getElementById('editPrice').value = row.querySelector('.product-price').textContent.replace('$', '');
                document.getElementById('editQuantity').value = parseInt(row.querySelector('.product-stock-badge').textContent);
                editModal.show();
            };

            editForm.addEventListener('submit', async (e) => {
                e.preventDefault();
                const data = {
                    id: document.getElementById('editId').value,
                    name: document.getElementById('editName').value,
                    price: document.getElementById('editPrice').value,
                    quantity: document.getElementById('editQuantity').value
                };
                try {
                    await fetch('/api/update_product.php', { method: 'POST', body: JSON.stringify(data) });
                    editModal.hide();
                    loadProducts();
                } catch (e) { alert('Update failed'); }
            });

            window.deleteProduct = async (id) => {
                if (!confirm('Delete this product?')) return;
                try {
                    await fetch('/api/delete_product.php', { method: 'POST', body: JSON.stringify({id}) });
                    loadProducts();
                } catch (e) { alert('Delete failed'); }
            };

            loadProducts();
        });
    </script>
</body>
</html>
